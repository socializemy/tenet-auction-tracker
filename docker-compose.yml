version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auction_backend
    environment:
      - CHROME_BIN_PATH=/usr/bin/google-chrome
      - DATABASE_URL=sqlite:////app/data/auction_data.db
      # Add environment variables here if needed (e.g., QUALITY_LOAN_USER)
    ports:
      - "8000:8000"
    volumes:
      # Mount the manual data ingest & database folder for offline parsing / safe sqlite states
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build with empty API URL so Nginx forwards /api requests natively to the backend
        - VITE_API_URL=""
    container_name: auction_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
