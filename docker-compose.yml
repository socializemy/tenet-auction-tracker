version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auction_backend
    environment:
      - CHROME_BIN_PATH=/usr/bin/google-chrome
      - DISPLAY=:99
      # Add environment variables here if needed (e.g., ZILLOW_API_KEY)
    ports:
      - "8000:8000"
    volumes:
      # Mount the database to persist data across container restarts
      - ./backend/auction_data.db:/app/auction_data.db
      # Mount the manual data ingest folder for offline parsing
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build with empty API URL so Nginx forwards /api requests natively to the backend
        - VITE_API_URL=""
    container_name: auction_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
